name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Flutter web build ──────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Build Flutter web
        working-directory: mobile
        run: |
          flutter pub get
          flutter build web --release

      # ── Deploy Flutter web files to EC2 ───────────────────────────────────
      - name: Deploy web app to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "mobile/build/web/*"
          target: "/var/www/coachtrack"
          strip_components: 3

      # ── Pull backend changes + restart ────────────────────────────────────
      - name: Deploy backend and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/coachtrack
            git pull origin master
            cd backend
            npm install --omit=dev
            pm2 restart coachtrack
            chmod -R 755 /var/www/coachtrack/
            sudo systemctl reload nginx
