name: coachtrack
description: CoachTrack - Fitness Coaching App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1
  dio: ^5.4.3

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  youtube_player_iframe: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
